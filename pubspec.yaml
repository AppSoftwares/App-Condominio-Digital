# apps/mobile/pubspec.yaml
name: condominio_app
description: App de gestión de condominios
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Estado y DI
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navegación
  go_router: ^13.2.0

  # HTTP
  dio: ^5.4.3+1
  pretty_dio_logger: ^1.4.0

  # Cache local (offline-first)
  hive_flutter: ^1.1.0

  # Persistencia segura (tokens)
  flutter_secure_storage: ^9.0.0

  # Firebase
  firebase_core: ^2.30.1
  firebase_auth: ^4.19.1
  firebase_messaging: ^14.9.1
  google_sign_in: ^6.2.1

  # UI
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  image_picker: ^1.1.2      # subir comprobantes
  file_picker: ^8.0.3

  # Fecha/hora
  intl: ^0.19.0

  # Socket.io (chat)
  socket_io_client: ^2.0.3+1

  # Variables de entorno
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.9
  hive_generator: ^2.0.1
  json_annotation: ^4.9.0
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
